<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Snake</title>
    <link rel="stylesheet" href="style.css" />
    <script src="./p5.min.js"></script>
  </head>

  <body>
    <video id="bgVideo" autoplay muted loop style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:-1;">
      <source src="sky3.mp4" type="video/mp4">
    </video>
    <div id="hud">
      <div class="stat">SCORE <span id="scoreDisplay">0</span></div>
      <div class="stat">LENGTH <span id="lengthDisplay">3</span></div>
      <div class="stat">SPEED <span id="speedDisplay">0</span> fps</div>
      <button id="modeBtn">🤖 AUTOPILOT</button>
      <button id="pauseBtn">⏸ PAUSE</button>
      <div class="stat" style="font-size: 11px; color: #555">
        M = toggle · ↑↓←→ / WASD
      </div>
    </div>
    <button id="settingsBtn" class="settings-btn hidden">🛠</button>
    <div id="settingsPanel" class="settings-panel hidden">
      <div class="settings-header">
        <h2>SETTINGS</h2>
        <button class="close-btn" id="closesettingsBtn">✕</button>
      </div>
      <div class="settings-content">
        <div class="settings-section">
          <label style="color:#aaa; font-size:13px;">Mode
            <button id="inGameModeBtn" class="mode-toggle">🤖 AUTOPILOT</button>
          </label>
        </div>
        <div class="settings-section">
          <label style="color:#aaa; font-size:13px">Speed <input id="inGameSpeed" type="range" min="1" max="60" value="20" style="width:140px; margin-left:6px;"/><span id="speedValue">20</span> fps</label>
        </div>
        <div class="settings-button-group">
          <button id="resumeBtn" class="settings-action-btn resume">▶ RESUME</button>
          <button id="restartBtn" class="settings-action-btn restart">↺ RESTART</button>
        </div>
      </div>
    </div>
    <div id="overlay">
      <h1>SNAKE</h1>
      <p>Autopilot ON by default — press <b>M</b> to take manual control</p>
      <div style="margin-bottom:16px; display:flex; gap:12px; align-items:center;">
        <label style="color:#aaa; font-size:13px">Cols <input id="inputCols" type="number" min="5" max="250" value="110" style="width:64px; margin-left:6px;"/></label>
        <label style="color:#aaa; font-size:13px">Rows <input id="inputRows" type="number" min="5" max="150" value="70" style="width:64px; margin-left:6px;"/></label>
        <label style="color:#aaa; font-size:13px">Speed <input id="inputSpeed" type="number" min="1" max="60" value="20" style="width:64px; margin-left:6px;"/></label>
      </div>
      <div style="margin-bottom:16px; display:flex; gap:12px; align-items:center;">
        <label style="color:#aaa; font-size:13px">Theme
          <select id="themeSelect" style="width:120px; margin-left:6px; padding:4px; background:#1a1a2e; color:#adf; border:1px solid #444; border-radius:2px;">
            <option value="green-black">Green & Black</option>
            <option value="sky-transparent">Sky (Transparent)</option>
            <option value="sky-canvas">Sky (Canvas)</option>
          </select>
        </label>
      </div>
      <div class="oscore" id="finalScore"></div>
      <button id="startBtn">▶ START</button>
    </div>
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script> -->
    <script src="ai.js"></script>
    <script src="game.js"></script>
    <script src="ui.js"></script>
    <script src="sketch.js"></script>
  </body>
</html>
