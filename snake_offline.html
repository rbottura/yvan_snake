// ---- inlined ai.js ----
// ai.js - pathfinding and heuristic helpers
function hamIdx(x, y) {
  return y % 2 === 0
    ? y * CFG.COLS + x
    : y * CFG.COLS + (CFG.COLS - 1 - x);
}

function bfs(start, goal, blocked) {
  const key = (p) => p.x + "," + p.y;
  const queue = [{ pos: start, path: [] }];
  const vis = new Set([key(start)]);
  const ds = [
    { x: 1, y: 0 },
    { x: -1, y: 0 },
    { x: 0, y: 1 },
    { x: 0, y: -1 },
  ];
  while (queue.length) {
    const { pos, path } = queue.shift();
    for (const d of ds) {
      const nx = pos.x + d.x,
        ny = pos.y + d.y;
      if (nx < 0 || nx >= CFG.COLS || ny < 0 || ny >= CFG.ROWS) continue;
      const k = nx + "," + ny;
      if (vis.has(k) || blocked.has(k)) continue;
      const np = [...path, d];
      if (nx === goal.x && ny === goal.y) return np;
      vis.add(k);
      queue.push({ pos: { x: nx, y: ny }, path: np });
    }
  }
  return null;
}

function getAIDir() {
  const head = snake[0];
  const sset = new Set(snake.map((s) => s.x + "," + s.y));
  const path = bfs(head, apple, sset);
  if (path && path.length > 0) {
    const d = path[0];
    const nh = { x: head.x + d.x, y: head.y + d.y };
    const sim = [nh, ...snake];
    if (!(nh.x === apple.x && nh.y === apple.y)) sim.pop();
    const simSet = new Set(sim.slice(0, -1).map((p) => p.x + "," + p.y));
    const tail = sim[sim.length - 1];
    if (bfs(nh, tail, simSet)) return d;
  }
  const hi = hamIdx(head.x, head.y);
  const ds = [
    { x: 1, y: 0 },
    { x: -1, y: 0 },
    { x: 0, y: 1 },
    { x: 0, y: -1 },
  ];
  let best = null,
    bestDiff = Infinity;
  for (const d of ds) {
    const nx = head.x + d.x,
      ny = head.y + d.y;
    if (nx < 0 || nx >= CFG.COLS || ny < 0 || ny >= CFG.ROWS) continue;
    if (sset.has(nx + "," + ny)) continue;
    const ni = hamIdx(nx, ny);
    const diff = (ni - hi + CFG.COLS * CFG.ROWS) % (CFG.COLS * CFG.ROWS);
    if (diff > 0 && diff < bestDiff) {
      bestDiff = diff;
      best = d;
    }
  }
  if (best) return best;
  for (const d of ds) {
    const nx = head.x + d.x,
      ny = head.y + d.y;
    if (nx < 0 || nx >= CFG.COLS || ny < 0 || ny >= CFG.ROWS) continue;
    if (!sset.has(nx + "," + ny)) return d;
  }
  return dir;
}

    <script>
// ---- inlined game.js ----
// game.js - game state and core logic
const CFG = { COLS: 19, ROWS: 11, BASE_FPS: 5 };
let snake, apple, dir, nextDir, score, gameOver, autopilot, frameAcc;
let paused = false;

function resetGame() {
  const cx = Math.floor(CFG.COLS / 2), cy = Math.floor(CFG.ROWS / 2);
  snake = [
    { x: cx, y: cy },
    { x: cx - 1, y: cy },
    { x: cx - 2, y: cy },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  gameOver = false;
  frameAcc = 0;
  paused = false;
  placeApple();
}

function placeApple() {
  const occ = new Set(snake.map((s) => s.x + "," + s.y));
  let ax, ay;
  do {
    ax = Math.floor(Math.random() * CFG.COLS);
    ay = Math.floor(Math.random() * CFG.ROWS);
  } while (occ.has(ax + "," + ay));
  apple = { x: ax, y: ay };
}

function doStep() {
  if (autopilot) {
    dir = getAIDir();
  } else {
    if (!(nextDir.x === -dir.x && nextDir.y === -dir.y)) dir = nextDir;
  }
  const head = snake[0];
  const nh = { x: head.x + dir.x, y: head.y + dir.y };
  if (nh.x < 0 || nh.x >= CFG.COLS || nh.y < 0 || nh.y >= CFG.ROWS) {
    endGame();
    return;
  }
  for (let i = 0; i < snake.length - 1; i++) if (snake[i].x === nh.x && snake[i].y === nh.y) {
    endGame();
    return;
  }
  snake.unshift(nh);
  if (nh.x === apple.x && nh.y === apple.y) {
    score++;
    CFG.BASE_FPS = Math.min(CFG.BASE_FPS, CFG.BASE_FPS + Math.floor(score / 15));
    placeApple();
  } else {
    snake.pop();
  }
}

function endGame() {
  gameOver = true;
  const text = "Score: " + score + "  |  Length: " + snake.length;
  if (typeof showGameOver === "function") showGameOver(text);
}

    <script>
// ---- inlined ui.js ----
// ui.js - DOM interactions and HUD/overlay handling
const overlay = document.getElementById("overlay");
const finalScoreEl = document.getElementById("finalScore");
const startBtn = document.getElementById("startBtn");
const modeBtn = document.getElementById("modeBtn");
const pauseBtn = document.getElementById("pauseBtn");

const inputCols = document.getElementById("inputCols");
const inputRows = document.getElementById("inputRows");
const inputSpeed = document.getElementById("inputSpeed");
const themeSelect = document.getElementById("themeSelect");
const bgVideo = document.getElementById("bgVideo");

// Settings panel elements
const settingsBtn = document.getElementById("settingsBtn");
const settingsPanel = document.getElementById("settingsPanel");
const closeSettingsBtn = document.getElementById("closesettingsBtn");
const inGameModeBtn = document.getElementById("inGameModeBtn");
const inGameSpeed = document.getElementById("inGameSpeed");
const speedValue = document.getElementById("speedValue");
const resumeBtn = document.getElementById("resumeBtn");
const restartBtn = document.getElementById("restartBtn");

let currentTheme = "green-black"; // default theme
let wasGameRunning = false;
let autoRestartInterval = null;
let autoRestartRemaining = 0;

function cancelAutoRestart() {
  if (autoRestartInterval) {
    clearInterval(autoRestartInterval);
    autoRestartInterval = null;
    autoRestartRemaining = 0;
  }
  const countdownEl = document.getElementById('autoRestartCountdown');
  if (countdownEl && countdownEl.parentNode) countdownEl.parentNode.removeChild(countdownEl);
}

function applyTheme(theme) {
  currentTheme = theme;
  document.body.className = theme === "green-black" ? "" : `theme-${theme}`;
  
  // Show/hide video based on theme
  if (theme === "sky-transparent" || theme === "sky-canvas") {
    bgVideo.style.display = "block";
  } else {
    bgVideo.style.display = "none";
  }
}

function toggleMode() {
  autopilot = !autopilot;
  modeBtn.textContent = autopilot ? "🤖 AUTOPILOT" : "🎮 MANUAL";
  modeBtn.classList.toggle("manual", !autopilot);
  // Update in-game mode button too
  inGameModeBtn.textContent = autopilot ? "🤖 AUTOPILOT" : "🎮 MANUAL";
  inGameModeBtn.classList.toggle("autopilot", autopilot);
  inGameModeBtn.classList.toggle("manual", !autopilot);
}

function showGameOver(text) {
  finalScoreEl.textContent = text;
  overlay.querySelector("h1").textContent = "GAME OVER";
  overlay.querySelector("p").textContent = "Press start to play again";
  startBtn.textContent = "↺ RESTART";
  overlay.classList.remove("hidden");
  // Hide settings panel
  hideSettingsPanel();
  settingsBtn.classList.add("hidden");
  // Start auto-restart countdown (5 seconds)
  cancelAutoRestart();
  autoRestartRemaining = 5;
  // update UI countdown next to final score
  const countdownNodeId = 'autoRestartCountdown';
  let countdownEl = document.getElementById(countdownNodeId);
  if (!countdownEl) {
    countdownEl = document.createElement('div');
    countdownEl.id = countdownNodeId;
    countdownEl.style.marginTop = '8px';
    countdownEl.style.color = '#aaa';
    countdownEl.style.fontSize = '14px';
    overlay.appendChild(countdownEl);
  }
  countdownEl.textContent = `Restarting in ${autoRestartRemaining}s...`;
  autoRestartInterval = setInterval(() => {
    autoRestartRemaining -= 1;
    if (countdownEl) countdownEl.textContent = `Restarting in ${autoRestartRemaining}s...`;
    if (autoRestartRemaining <= 0) {
      cancelAutoRestart();
      // start a fresh game with current CFG settings
      overlay.classList.add('hidden');
      if (typeof resetGame === 'function') resetGame();
      updateHUD();
      // ensure settings button visibility updates
      if (snake && !gameOver) settingsBtn.classList.remove('hidden');
    }
  }, 1000);
}

function updateHUD() {
  document.getElementById("scoreDisplay").textContent = score || 0;
  document.getElementById("lengthDisplay").textContent = snake ? snake.length : 0;
  document.getElementById("speedDisplay").textContent = CFG.BASE_FPS;
}

function togglePause() {
  paused = !paused;
  if (pauseBtn) pauseBtn.textContent = paused ? "▶ RESUME" : "⏸ PAUSE";
}

function showSettingsPanel() {
  // Auto-pause the game
  if (!paused && snake && !gameOver) {
    wasGameRunning = true;
    paused = true;
    if (pauseBtn) pauseBtn.textContent = "▶ RESUME";
  }
  
  // Update in-game settings to match current state
  inGameModeBtn.textContent = autopilot ? "🤖 AUTOPILOT" : "🎮 MANUAL";
  inGameModeBtn.classList.toggle("autopilot", autopilot);
  inGameModeBtn.classList.toggle("manual", !autopilot);
  inGameSpeed.value = CFG.BASE_FPS;
  speedValue.textContent = CFG.BASE_FPS;
  
  settingsPanel.classList.remove("hidden");
  settingsPanel.classList.add("shown");
}

function hideSettingsPanel() {
  settingsPanel.classList.remove("shown");
  settingsPanel.classList.add("hidden");
  wasGameRunning = false;
}

startBtn.addEventListener("click", () => {
  // Cancel auto-restart if running (user manually starting)
  cancelAutoRestart();
  // Apply selected theme
  const selectedTheme = themeSelect.value;
  applyTheme(selectedTheme);
  
  // read config inputs
  const cols = parseInt(inputCols.value, 10) || CFG.COLS;
  const rows = parseInt(inputRows.value, 10) || CFG.ROWS;
  const speed = parseInt(inputSpeed.value, 10) || CFG.BASE_FPS;
  CFG.COLS = Math.max(5, cols);
  CFG.ROWS = Math.max(5, rows);
  CFG.BASE_FPS = Math.max(1, Math.min(60, speed));
  console.log(rows, cols, speed);
  // resize canvas to new grid
  if (typeof windowResized === "function") windowResized();
  overlay.classList.add("hidden");
  if (typeof resetGame === "function") resetGame();
  updateHUD();
});

modeBtn.addEventListener("click", toggleMode);
if (pauseBtn) pauseBtn.addEventListener("click", togglePause);

// Settings panel event listeners
settingsBtn.addEventListener("click", showSettingsPanel);
closeSettingsBtn.addEventListener("click", hideSettingsPanel);

resumeBtn.addEventListener("click", () => {
  // Resume the paused game
  cancelAutoRestart();
  paused = false;
  if (pauseBtn) pauseBtn.textContent = "⏸ PAUSE";
  hideSettingsPanel();
});

restartBtn.addEventListener("click", () => {
  // Reset game with current settings overlay
  cancelAutoRestart();
  hideSettingsPanel();
  overlay.querySelector("h1").textContent = "SNAKE";
  overlay.querySelector("p").textContent = "Autopilot ON by default — press <b>M</b> to take manual control";
  startBtn.textContent = "▶ START";
  overlay.classList.remove("hidden");
  settingsBtn.classList.add("hidden");
  // Reset cols and rows to current (or user can change them)
  inputCols.value = CFG.COLS;
  inputRows.value = CFG.ROWS;
  inputSpeed.value = CFG.BASE_FPS;
});

inGameModeBtn.addEventListener("click", toggleMode);

inGameSpeed.addEventListener("input", (e) => {
  const newSpeed = parseInt(e.target.value, 10);
  speedValue.textContent = newSpeed;
  CFG.BASE_FPS = Math.max(1, Math.min(60, newSpeed));
  updateHUD();
});

    </script>

    <script>
// ---- inlined sketch.js ----
// sketch.js - p5 global-mode sketch and rendering
let cellW, cellH, canvasW, canvasH, diamondGfx;

function setup() {
  const hudH = document.getElementById("hud").offsetHeight;
  canvasW = window.innerWidth;
  canvasH = window.innerHeight - hudH;
  cellW = canvasW / CFG.COLS;
  cellH = canvasH / CFG.ROWS;
  // Create canvas with alpha for transparency support
  const cnv = createCanvas(canvasW, canvasH);
  cnv.parent(document.body);
  // Enable alpha for transparent canvas
  cnv.canvas.style.opacity = "1";
  frameRate(60);
  makeDiamond();
  autopilot = true;
}

function makeDiamond() {
  const dw = Math.ceil(cellW * 2.8),
    dh = Math.ceil(cellH * 2.8);
  diamondGfx = createGraphics(dw, dh);
  diamondGfx.textAlign(CENTER, CENTER);
  diamondGfx.textSize(Math.min(cellW, cellH) * 1.5);
  diamondGfx.text("💎", dw / 2, dh / 2);
}

function draw() {
  // Get current theme
  const theme = currentTheme || "green-black";
  
  // Show settings button during gameplay
  if (snake && !gameOver) {
    document.getElementById("settingsBtn").classList.remove("hidden");
  } else {
    document.getElementById("settingsBtn").classList.add("hidden");
  }
  
  if (!snake) {
    if (theme === "sky-canvas") {
      // Draw video on canvas for sky-canvas theme
      const bgVideo = document.getElementById("bgVideo");
      if (bgVideo && bgVideo.readyState === bgVideo.HAVE_ENOUGH_DATA) {
        image(bgVideo, 0, 0, canvasW, canvasH);
      } else {
        background("#1a1a1a");
      }
    } else if (theme === "sky-transparent") {
      // Transparent background - video shows through
      clear();
    } else {
      // Default green-black theme
      background("#A9E000");
    }
    return;
  }
  
  // Apply background based on theme
  if (theme === "sky-canvas") {
    const bgVideo = document.getElementById("bgVideo");
    if (bgVideo && bgVideo.readyState === bgVideo.HAVE_ENOUGH_DATA) {
      image(bgVideo, 0, 0, canvasW, canvasH);
    } else {
      background("#1a1a1a");
    }
  } else if (theme === "sky-transparent") {
    clear();
  } else {
    background("#A9E000");
  }
  
  // stroke(20, 22, 28);
  // strokeWeight(0.3);
  noStroke();
  
  // Set grid color based on theme
  if (theme === "green-black") {
    stroke(20, 22, 28, 100);
  } else if (theme === "sky-transparent" || theme === "sky-canvas") {
    stroke(255, 255, 255, 30);  // Light grid for sky backgrounds
  }
  strokeWeight(0.5);
  noStroke();
  for (let x = 0; x <= CFG.COLS; x++) line(x * cellW, 0, x * cellW, canvasH);
  for (let y = 0; y <= CFG.ROWS; y++) line(0, y * cellH, canvasW, y * cellH);
  if (gameOver) return;
  if (!paused) {
    frameAcc += deltaTime / 1000;
    const step = 1 / CFG.BASE_FPS;
    while (frameAcc >= step) {
      frameAcc -= step;
      doStep();
    }
  } else {
    // draw paused indicator
    push();
    fill(255, 255, 255, 64);
    textAlign(CENTER, CENTER);
    textSize(Math.min(cellW, cellH) * 0.9);
    text("PAUSED", width / 2, height / 2);
    pop();
  }
  const dw = diamondGfx.width,
    dh = diamondGfx.height;
  image(
    diamondGfx,
    apple.x * cellW - (dw - cellW) / 2,
    apple.y * cellH - (dh - cellH) / 2,
  );
  for (let i = snake.length - 1; i >= 0; i--) {
    const t = 1 - i / snake.length;
    const r = lerp(30, 80, t),
      g = lerp(100, 220, t),
      b = lerp(60, 120, t);
    fill(r, g, b);
    const seg = snake[i];
    const px = seg.x * cellW,
      py = seg.y * cellH;
    const sw = cellW * 1,
      sh = cellH * 1;
    fill("black");
    // let gap = 3;
    let gap = cellW * 0.1;
    rect(px, py, sw / 4, sh / 4);
    rect(px + gap + sw / 4, py, sw / 4, sh / 4);
    rect(px + 2 * gap + (2 * sw) / 4, py, sw / 4, sh / 4);

    rect(px, py + gap + sh / 4, sw / 4, sh / 4);
    rect(px + gap + sw / 4, py + gap + sh / 4, sw / 4, sh / 4);
    rect(px + 2 * gap + (2 * sw) / 4, py + gap + sh / 4, sw / 4, sh / 4);

    rect(px, py + 2 * gap + (2 * sh) / 4, sw / 4, sh / 4);
    rect(px + gap + sw / 4, py + 2 * gap + (2 * sh) / 4, sw / 4, sh / 4);
    rect(
      px + 2 * gap + (2 * sw) / 4,
      py + 2 * gap + (2 * sh) / 4,
      sw / 4,
      sh / 4,
    );
  }
  updateHUD();
}

function keyPressed() {
  const k = keyCode,
    K = (key || "").toUpperCase();
  if (K === "M") {
    toggleMode();
    return;
  }
  if (K === "P") {
    if (typeof togglePause === "function") togglePause();
    return;
  }
  if (!autopilot) {
    if (k === UP_ARROW || K === "W") nextDir = { x: 0, y: -1 };
    if (k === DOWN_ARROW || K === "S") nextDir = { x: 0, y: 1 };
    if (k === LEFT_ARROW || K === "A") nextDir = { x: -1, y: 0 };
    if (k === RIGHT_ARROW || K === "D") nextDir = { x: 1, y: 0 };
  }
}

function windowResized() {
  const hudH = document.getElementById("hud").offsetHeight;
  canvasW = window.innerWidth;
  canvasH = window.innerHeight - hudH;
  cellW = canvasW / CFG.COLS;
  cellH = canvasH / CFG.ROWS;
  resizeCanvas(canvasW, canvasH);
  makeDiamond();
}
